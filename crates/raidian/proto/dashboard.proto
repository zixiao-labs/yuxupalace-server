syntax = "proto3";
package raidian;

// Dashboard and analytics messages.

message DashboardStats {
  int32 repo_count = 1;
  int32 open_issues = 2;
  int32 open_merge_requests = 3;
  float pipeline_pass_rate = 4;
  repeated RecentActivity recent_activities = 5;
}

message RecentActivity {
  string user = 1;
  string action = 2;
  string target = 3;
  string repo = 4;
  int64 timestamp = 5;
}
