syntax = "proto3";
package raidian.proto;

// CI/CD pipeline messages.

message Pipeline {
  string id = 1;
  string repository_id = 2;
  optional string merge_request_id = 3;
  string branch = 4;
  string commit_sha = 5;
  string commit_message = 6;
  string triggered_by = 7;
  string status = 8;          // "pending", "running", "success", "failed", "cancelled"
  repeated PipelineStage stages = 9;
  optional int32 duration_secs = 10;
  int64 created_at = 11;
  optional int64 started_at = 12;
  optional int64 finished_at = 13;
}

message PipelineStage {
  string id = 1;
  string name = 2;
  string status = 3;          // "pending", "running", "success", "failed"
  string log_output = 4;
  int32 sort_order = 5;
  optional int64 started_at = 6;
  optional int64 finished_at = 7;
}

message TriggerPipelineRequest {
  string branch = 1;
  optional string merge_request_id = 2;
}

message ListPipelinesRequest {
  optional string status = 1;
  optional string branch = 2;
  optional int32 page = 3;
  optional int32 per_page = 4;
}

message ListPipelinesResponse {
  repeated Pipeline pipelines = 1;
  int32 total = 2;
}