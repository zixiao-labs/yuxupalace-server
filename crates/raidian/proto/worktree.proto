syntax = "proto3";
package raidian.collab;

message UpdateWorktree {
  uint64 project_id = 1;
  uint64 worktree_id = 2;
  string root_name = 3;
  string abs_path = 4;
  repeated Entry updated_entries = 5;
  repeated uint64 removed_entries = 6;
  repeated uint64 removed_repositories = 7;
  uint64 scan_id = 8;
  bool is_last_update = 9;
  repeated uint64 updated_repositories = 10;
}

message Entry {
  uint64 id = 1;
  bool is_dir = 2;
  string path = 3;
  uint64 inode = 4;
  uint64 mtime_seconds = 5;
  uint32 mtime_nanos = 6;
  bool is_symlink = 7;
  bool is_external = 8;
  bool is_ignored = 9;
  bool is_private = 10;
  optional string char_bag = 11;
  optional GitEntry git_status = 12;
}

message GitEntry {
  enum Status {
    UNMODIFIED = 0;
    MODIFIED = 1;
    ADDED = 2;
    DELETED = 3;
    RENAMED = 4;
    COPIED = 5;
    UNTRACKED = 6;
    IGNORED = 7;
    CONFLICTED = 8;
  }
  Status status = 1;
}

message CreateProjectEntry {
  uint64 project_id = 1;
  uint64 worktree_id = 2;
  string path = 3;
  bool is_directory = 4;
}
message RenameProjectEntry {
  uint64 project_id = 1;
  uint64 entry_id = 2;
  string new_path = 3;
}
message DeleteProjectEntry {
  uint64 project_id = 1;
  uint64 entry_id = 2;
  bool use_trash = 3;
}
message CopyProjectEntry {
  uint64 project_id = 1;
  uint64 entry_id = 2;
  string new_path = 3;
}
message ProjectEntryResponse {
  optional Entry entry = 1;
  uint64 worktree_scan_id = 2;
}
message ExpandProjectEntry {
  uint64 project_id = 1;
  uint64 entry_id = 2;
}
