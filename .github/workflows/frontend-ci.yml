name: Frontend CI

# Runs only when the frontend changes (or this workflow itself changes), so Rust
# PRs don't pay the yarn install cost.
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: tsc + nasti build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      # --frozen-lockfile is Yarn v1; it fails if yarn.lock would have been
      # modified by the install, which is exactly what we want in CI.
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # `yarn build` chains `tsc -b && nasti build && cp -r public/. dist/`,
      # so this single step doubles as type-check and bundle.
      - name: Build (type-check + bundle)
        run: yarn build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist
          retention-days: 7
          if-no-files-found: error
